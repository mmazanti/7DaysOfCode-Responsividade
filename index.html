<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aplicativo de gerenciamento e agendamento de consultas online e presenciais.">
    <title>7 Days of Code - Responsiveness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="cabecalho">
        <section class="cabecalho__barra_superior">
            <p class="cabecalho__barra_superior-hora">03:33</p>
            <div class="cabecalho__barra_superior-icones">
                <img src="./assets/signal_cellular_4_bar.svg" alt="Icone sinal de celular">
                <img src="./assets/battery_full.svg" alt="Icone bateria cheia">
                <img src="./assets/wifi.svg" alt="Icone wifi">
            </div>
        </section>

        <section class="cabecalho__perfil">
            <div class="cabecalho__perfil-foto">
                <img src="./assets/perfil-1.svg" alt="">
            </div>
            <div class="cabecalho__perfil-apresentação">
                <h1 class="cabecalho__perfil-titulo">Olá, Sônia</h1>
                <p class="cabecalho__perfil-texto">Mais 4 consultas hoje</p>
            </div>
        </section>
    </header>
    <main>
        <!-- As seções de agenda serão renderizadas dinamicamente pelo app.js aqui -->

        <section class="formulario_consulta">
            <h2>Agendar Nova Consulta</h2>
            <form class="formulario_consulta__form" action="#" method="POST">

                <div class="formulario_consulta__campo">
                    <label for="nome_paciente">Nome do Paciente</label>
                    <input type="text" id="nome_paciente" name="nome_paciente" placeholder="Digite o nome completo"
                        required>
                </div>

                <div class="formulario_consulta__campo">
                    <label for="tipo_consulta">Tipo de Consulta</label>
                    <select id="tipo_consulta" name="tipo_consulta" required>
                        <option value="" disabled selected>Selecione um tipo</option>
                        <option value="remota">Consulta Remota (Vídeo/Áudio)</option>
                        <option value="presencial">Consulta no Local</option>
                        <option value="casa">Consulta na Casa do Paciente</option>
                    </select>
                </div>

                <div class="formulario_consulta__grupo-data-hora">
                    <div class="formulario_consulta__campo">
                        <label for="data_consulta">Data</label>
                        <input type="date" id="data_consulta" name="data_consulta" required>
                    </div>

                    <div class="formulario_consulta__campo">
                        <label for="hora_consulta">Horário</label>
                        <input type="time" id="hora_consulta" name="hora_consulta" required>
                    </div>
                </div>

                <div class="formulario_consulta__campo">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" name="observacoes" rows="4"
                        placeholder="Alguma observação importante para a consulta?"></textarea>
                </div>

                <button type="submit" class="formulario_consulta__botao">Salvar Consulta</button>
            </form>
        </section>

        <div class="fab-container">
            <button type="button" class="fab-option fab-option--local" aria-label="Nova consulta na casa do paciente">
                <span class="fab-label">Nova consulta na casa do paciente</span>
                <img src="./assets/pinfabiconee.svg" alt="" aria-hidden="true">
            </button>
            <button type="button" class="fab-option fab-option--local" aria-label="Nova consulta por vídeo">
                <span class="fab-label">Nova consulta por vídeo</span>
                <img src="./assets/Camerafab.svg" alt="" aria-hidden="true">
            </button>

            <button type="button" class="fab-main" id="fab-main-button" aria-label="Abrir opções de nova consulta"
                aria-haspopup="menu">
                <img src="./assets/maisicone.svg" alt="" aria-hidden="true">
            </button>
        </div>

    </main>
    <footer>
        <ul class="rodapé-ações">
            <li class="rodapé-ações__item">
                <a href="#"><img src="./assets/Calendarioicone.svg" alt="Icone consultas">Consultas</a>
            </li>
            <li class="rodapé-ações__item">
                <a href="#"><img src="./assets/clientes icone.svg" alt="Icone clientes">Clientes</a>
            </li>
            <li class="rodapé-ações__item">
                <a href="#"><img src="./assets/relatorios icone.svg" alt="Icone relatórios">Relatórios</a>
            </li>
            <li class="rodapé-ações__item">
                <a href="#"><img src="./assets/menu icone.svg" alt="Icone menu">Menu</a>
            </li>
        </ul>
    </footer>

    <script src="app.js" defer></script>
</body>

</html>
